services:
  - type: web
    name: fraudshield-api
    runtime: node
    rootDir: backend/api-gateway
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        # Set this to your frontend's Render URL, e.g. https://fraudshield-frontend.onrender.com
        sync: false

  - type: web
    name: fraudshield-ml
    runtime: python
    rootDir: backend/ml-service
    buildCommand: pip install -r requirement.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000

  - type: web
    name: fraudshield-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      # CRA bakes these into the JS bundle at BUILD time — must be here
      - key: REACT_APP_API_URL
        value: /api
      - key: REACT_APP_WS_URL
        value: ""
