services:
  - type: web
    name: fraudshield-api
    runtime: node
    rootDir: backend/api-gateway
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: fraudshield-ml
    runtime: python
    rootDir: backend/ml-service
    buildCommand: pip install -r requirement.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000

  - type: web
    name: fraudshield-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start