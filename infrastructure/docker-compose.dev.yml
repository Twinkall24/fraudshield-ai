version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fraud-db
    environment:
      POSTGRES_DB: fraud_detection
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fraud_detection"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: fraud-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud-network

  # Adminer (Database GUI) - Changed port to 8081
  adminer:
    image: adminer:latest
    container_name: fraud-adminer
    ports:
      - "8081:8080"  # Changed from 8080:8080 to 8081:8080
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - fraud-network
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

networks:
  fraud-network:
    driver: bridge